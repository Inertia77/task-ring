
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.38" stop-color="#fff6ef"/>
      <stop offset="0.70" stop-color="#f1efff"/>
      <stop offset="1" stop-color="#eaf7ff"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" x2="1">
      <stop offset="0" stop-color="#3a7bff" stop-opacity=".72"/>
      <stop offset=".5" stop-color="#9b6dff" stop-opacity=".54"/>
      <stop offset="1" stop-color="#ff6a3d" stop-opacity=".62"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#g)"/>
  <circle cx="240" cy="160" r="150" fill="#3a7bff" opacity=".10" filter="url(#blur)"/>
  <circle cx="1320" cy="180" r="190" fill="#ff6a3d" opacity=".12" filter="url(#blur)"/>
  <circle cx="900" cy="840" r="230" fill="#7b61ff" opacity=".10" filter="url(#blur)"/>

  <!-- urban neon / ZZZ-like energy, abstract only -->
